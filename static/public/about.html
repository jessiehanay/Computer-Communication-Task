<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>About</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f4;
            color: #222222;
        }

        main {
            padding: 30px;
            background-color: white;
            border: 1px solid #dddddd;
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
        }

        p {
            line-height: 1.6;
        }

        img {
            display: block;
            width: 120px;
            height: 120px;
            margin: 25px 0;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <main>
        <h1>About the Server</h1>

        <p>
            This is a static HTML file served by a Python web server.
        </p>

        <p>
            The server was implemented using the low-level Python socket API.
        </p>

        <p>
            <img src="/images/logo2.svg" alt="Python file logo">
        </p>

        <p>
            <a href="/public/index.html">Return to the home page</a>
        </p>
    </main>
</body>

</html>
